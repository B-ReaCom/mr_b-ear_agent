<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<title>Mr. B-EAR - ALVO 1.9 AIエージェント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; height: 100dvh; overflow: hidden; }
body { font-family: 'Noto Sans JP', sans-serif; height: 100%; height: 100dvh; display: flex; flex-direction: column; background: #f5f5f5; overflow: hidden; }
.header { background: #1a1a1a; padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; border-bottom: 2px solid #E8A020; height: 64px; }
.logo { width: 48px; height: 48px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.title { font-family: Barlow, sans-serif; font-weight: 700; font-size: 18px; color: #ffffff; letter-spacing: 0.02em; line-height: 1.2; }
.subtitle { font-family: Barlow, sans-serif; font-size: 13px; color: #E8A020; letter-spacing: 0.02em; font-weight: 500; }
.status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
.status-text { font-size: 12px; color: #9ca3af; }
.messages { flex: 1; overflow-y: auto; padding: 1.5rem 1.5rem 140px 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.welcome { text-align: center; margin-top: 2rem; }
.welcome-icon { display: flex; justify-content: center; margin-bottom: 1.5rem; }
.welcome-icon img { height: 150px; width: auto; }
.welcome-title { font-family: Barlow, sans-serif; font-weight: 700; font-size: 22px; color: #1f2937; margin-bottom: 2rem; line-height: 1.6; }
.welcome-title ruby { ruby-position: over; }
.welcome-title rt { font-family: 'Noto Sans JP', sans-serif; font-size: 9px; font-weight: 500; color: #E8A020; letter-spacing: 0.05em; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin: 0 auto; }
.suggestion-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid #d1d5db; background: white; color: #1f2937; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.suggestion-btn:hover { background: #E8A020; color: #1a1a1a; border-color: #E8A020; }
.message { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.25s ease forwards; }
.message.user { justify-content: flex-end; }
.avatar { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: contain; }
.avatar.assistant { background: transparent; }
.avatar.user { background: transparent; }
.bubble { max-width: 72%; padding: 12px 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.bubble.user { border-radius: 18px 18px 4px 18px; background: #E8A020; color: #1a1a1a; }
.bubble.assistant { border-radius: 18px 18px 18px 4px; background: white; color: #1f2937; border: 0.5px solid #e5e7eb; }
.msg-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f3f4f6; flex-wrap: wrap; }
.msg-btn { background: #f9fafb; border: 1px solid #e5e7eb; color: #4b5563; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.msg-btn:hover { background: #E8A020; color: #1a1a1a; border-color: #E8A020; }
.msg-btn.copied { background: #10b981; color: white; border-color: #10b981; }
.loading { display: flex; gap: 5px; align-items: center; padding: 12px 20px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #E8A020; animation: dots 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 1rem 1.5rem; border-top: 0.5px solid #e5e7eb; background: white; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.input-container { display: flex; gap: 10px; align-items: flex-end; }
.chat-input { flex: 1; resize: none; padding: 12px 16px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; background: #f9fafb; color: #1f2937; min-height: 48px; max-height: 120px; line-height: 1.5; transition: border-color 0.15s; }
.chat-input:focus { outline: none; border-color: #E8A020; }
.send-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; flex-shrink: 0; }
.send-btn .bear-icon { width: 75px; height: 75px; object-fit: contain; transition: transform 0.2s; }
.send-btn:hover:not(:disabled) .bear-icon { transform: scale(1.1) rotate(-5deg); }
.send-btn:active:not(:disabled) .bear-icon { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.disclaimer { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 8px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes dots { 0%,80%,100%{opacity:0} 40%{opacity:1} }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
@media (max-width: 768px) {
  .welcome-icon img { height: 120px; width: auto; }
  .avatar { width: 55px; height: 55px; }
}
</style>
</head>

Q1. ReaCom ALVO 1.9とは何ですか？
ReaCom ALVO 1.9は、B-EARが展開する業務現場向けのリアルタイムワイヤレスコミュニケーションシステムである。
騒音のある現場や複数人が連携して作業する環境で、ハンズフリーによる同時通話を可能にすることを目的としている。従来の押しボタン式無線機のように「話す人がボタンを押して順番に話す」方式ではなく、会話に近い感覚でリアルタイムに情報共有できる点が特徴である。
1.9GHz帯DECT方式を採用しているため、スマートフォンやWi-Fi機器が多く使用する2.4GHz帯の混雑の影響を受けにくく、人が多く集まるスタジアム・コンサート会場・イベント会場などでも安定した通信を目指せる。

Q2. ReaComとはどういう意味ですか？
ReaComは、Real-time Wireless Communicationをもとにした名称である。現場で必要とされる「リアルタイム性」「確実な意思疎通」「業務遂行のための通信」「常につながっている通信」を表現している。ALVO 1.9は、単に音声を届けるだけでなく、現場判断や安全確認を支える通信機として位置づける。

ALVO 1.9は、通話距離・ノイズキャンセル性能・音質・小型軽量性・Bluetooth接続・Room機能・有線ケーブル接続による拡張運用を高い次元で組み合わせた業務現場向けリアルタイム通信システムである。

Q4. ALVO 1.9は、どのような現場に向いていますか？
以下のような現場に向いている。
・建設・土木・道路工事・橋梁・のり面・トンネル工事
・重機・クレーン作業
・鉄道保守・高速道路保守・補修工事
・大型貨物・大型輸送
・工場・プラント・送電工事・解体工事
・スタジアム・イベント・コンサート会場運営
・スポーツ審判（競馬・ボートレース・オートレース・競輪場など）
・介護・病院施設
・航空・ヘリ関連
・港湾・船舶関連
・官公庁・防災・防衛関連
特に、騒音・距離・両手作業・複数人連携・判断スピードが課題になる現場に適している。また、1.9GHz帯DECT方式を採用しているため、2.4GHz帯が混雑しやすい大規模イベント会場や人が多い施設でも特長が活きやすい。

Q5. ALVO 1.9は、個人利用向けですか？
基本的には法人・団体・業務現場向けの製品である。趣味用途や個人利用を完全に否定するものではないが、価格帯・機能・運用目的は業務用を前提としている。数千円〜数万円程度の一般的なインカムや簡易トランシーバーとは異なる製品として検討する必要がある。

Q6. ALVO 1.9の価格はいくらですか？
ALVO 1.9は、1台10〜12万円程度です。ALVO1.9で通話するには別にヘッドセット等が必要になり、接続するBluetoothヘッドセット・有線ヘッドセット・アクセサリー類・購入台数・構成内容により金額は異なる。正式な金額は、必要台数・使用環境・接続機器・導入条件を確認したうえでのB-EAR取扱代理店からの見積りとなる。

Q7. なぜ数万円台のインカムより高いのですか？
ALVO 1.9は、簡易的な会話用インカムではなく、業務現場でのリアルタイム通信を目的とした製品である。
価格差の背景には、ENC 2.0によるノイズキャンセル性能・AES 256bitの通信暗号化・1.9GHz帯DECT方式による電波干渉への強さ・Bluetooth 5.2対応・ハンズフリー同時通話・IP54の防水防塵性能・アルミフレームによる耐久性・小型薄型軽量設計など、業務現場で使うための性能と構造が集約されていることがある。
価格だけで比較するよりも、現場での聞き返し・伝達ミス・作業停止・安全確認の遅れを減らせるかという観点で検討する製品である。

Q8. 予算が1台数万円程度でも導入できますか？
ALVO 1.9は1台10〜12万円程度の業務用通信機であるため、1台数万円程度の予算感とは合わない可能性が高い。価格帯が合わない場合は、まず製品概要や活用シーンを確認し、現場で解決したい課題や期待効果が価格に見合うかを検討することを推奨する。

Q9. デモ機を借りる前に価格を確認する必要がありますか？
必要である。ALVO 1.9は1台10〜12万円程度の業務用通信機であり、接続するヘッドセット・アクセサリー類・購入台数・構成内容により金額は異なる。この価格帯を理解したうえでデモを行うことで、導入検討の精度が上がり、双方にとって無駄な時間を減らせる。

Q10. 見積にはどのような情報が必要ですか？
主に以下の情報が必要である。
・使用現場・使用目的

C. 通話方式・同時通話
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Q11. ALVO 1.9は同時通話できますか？
ALVO 1.9は、ハンズフリー同時通話を想定した製品である。複数人が会話に近い感覚でリアルタイムに情報共有できるため、ボタンを押して順番に話す従来型の無線機とは大きく異なる運用が可能である。
1グループにつき最大10台まで同時通話でき、同一エリアで最大10グループの運用にも対応する。また、別グループの端末同士を有線ケーブルで接続することにより、同時通話できる人数を増やしたり、障害物を回避して離れたグループと通話したりする運用が可能である。

Q12. PTT無線機とは何が違いますか？
PTT無線機は、ボタンを押している間だけ話す方式である。この方式では話す順番が必要になり、複数人が同時に状況を共有する場面ではテンポが遅くなる。
ALVO 1.9は、ハンズフリー同時通話により、会話しながら判断・連携することを目的としている。作業中に手を止めず、必要な情報をその場で共有できる点が大きな違いである。

Q13. 作業中に手を使わず会話できますか？
ALVO 1.9は、ハンズフリーでの会話を想定している。重機操作・工具作業・点検作業・スポーツ審判・介護や医療作業など、手を使いながら連携が必要な現場で有効である。ALVO1.9はBluetooth 5.2なので、ケーブルの取り回しを抑えたワイヤレス運用も可能である。ただし、使用するヘッドセットや装着方法によって操作性は変わるため、現場に合った構成確認が必要である。

Q14. 複数人で同時に話すと混乱しませんか？
複数人の同時通話は、最初は会話が重なって混乱するのではないかと思われることがある。しかし、現場ごとに役割・発話ルール・グループ構成を整理することで、従来の単信通話に比べて効率的に情報共有できる。管理者・作業者・監視担当・オペレーターなどの役割が分かれている現場では、誰が誰と話すべきかを事前に設計することで効果を発揮しやすい。

Q15. 常時通話にすると、不要な会話まで聞こえてしまいませんか？
通話のオン・オフは本機のボタン操作で切り替えられる。また、接続するマイク側のミュート機能を使うことで、不要な音声が相手に伝わることを抑えられる。
常時通話は現場全体の状況共有に有効だが、関係のない会話が増えると集中を妨げる可能性もある。Room機能やグループ分け・通話ルール・使用者の役割設定を組み合わせ、現場に合った通信範囲を設計することを推奨する。

D. 通話距離・安定性
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Q16. ALVO 1.9の通話距離はどのくらいですか？
通話距離は使用環境により大きく異なる。目安として、障害物のない見晴らしの良い場所では、水平通信で約400m、垂直通信で約200mである。
ただし、天候・湿度・遮蔽物・建物構造・人や車両の動き・設置場所・設置高さ・周囲の電波環境などにより通話距離は前後する。正確な確認には、実際の現場または近い環境でのデモを推奨する。
また、別グループの端末同士を有線ケーブルで接続することにより、中継的に通信距離を伸ばす運用も可能である。今後は専用中継器の販売も予定しており、現在開発中である。

Q17. 建物の中でも使えますか？
使用できる可能性はあるが、建物の構造・壁の材質・階層・鉄骨・設備・周囲の電波環境によって通信状態は変わる。屋内利用では、見通し・遮蔽物・使用人数・移動範囲を確認したうえで適切な構成を検討する必要がある。1.9GHz帯DECT方式の特性が活きる場面もあるが、建物内では現場条件による差が大きいため、実際の使用環境に近い条件での確認を推奨する。

Q18. 屋外の広い現場でも使えますか？
ALVO 1.9は屋外・屋内を問わず使用できる業務用通信システムである。屋外の広い現場では、障害物のない見晴らしの良い場所において水平通信で約400mを目安に使用できる。垂直方向では約200mを目安としている。
広い現場や障害物の多い現場では、設置場所・グループ構成・有線ケーブル接続による中継的な運用を含めて、現場に合った構成を検討する。別グループの端末同士を有線ケーブルで接続することで、離れた場所との通話・障害物を回避した通信・通話範囲の大幅な拡張が可能となる。

Q19. 移動しながらでも使えますか？
移動しながらの使用も想定されるが、移動速度・周囲の人や車両・遮蔽物・電波環境によって通信状態は変わる。スポーツ審判・重機周辺・イベント会場・工事現場など、使用者が動きながら会話する場面でもALVO 1.9の特長が活きやすい。移動の多い現場では、事前に実運用に近い条件で確認することを推奨する。

Q20. 通信が絶対に途切れないと言えますか？
絶対に途切れないとは言えない。無線通信は、使用環境・距離・遮蔽物・周囲の電波状況・機器配置・天候・湿度などの影響を受ける。ALVO 1.9は業務現場での安定した通信を目指した製品だが、導入前には現場条件を確認し、必要に応じてデモで検証することが重要である。

E. ノイズキャンセル・騒音現場
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Q21. 騒音の大きい現場でも使えますか？
ALVO 1.9は騒音環境での使用を想定している。建設現場・工場・重機周辺・イベント会場・鉄道保守など、声が聞き取りにくい環境で通話品質を高めることを目指している。
独自のノイズキャンセル技術「ENC 2.0」を搭載しており、自社テストでは100dBを超える騒音下でも通話相手の声を聞き取りやすく会話しやすいことを確認している。ノイズキャンセル性能は世界最高レベルを目指して設計されている。ただし、騒音の種類・音量・マイク位置・ヘッドセット構成によって聞こえ方は変わるため、現場での確認が重要である。

Q22. 100%ノイズを消せますか？
100%ノイズを消すことはできない。ただし、ENC 2.0により一般的な環境ノイズは大きく抑制できる。自社デモでは、ノイズキャンセル性能に高い評価を得るケースが多い。騒音の種類や大きさ・マイクの位置・使用するヘッドセットによって効果は異なるため、事前確認を推奨する。

Q23. 工場やプラントの騒音でも使えますか？
工場やプラントの騒音環境でも、ALVO 1.9のENC 2.0によるノイズキャンセル性能とハンズフリー同時通話の特長が活きやすい。工場やプラントでは機械音・金属音・反響音・圧縮空気音など騒音の種類が多様であるため、現場の騒音条件を確認し、適切なヘッドセットやマイク構成を選ぶことが重要である。

Q24. 重機周辺でも使えますか？
重機周辺のような騒音が大きい現場でも、ALVO 1.9の特長が活きやすい。特に、重機オペレーターと誘導員・現場監督・作業員がリアルタイムに会話できることは、安全確認や作業効率に関わる重要な要素である。ただし、騒音レベルや装着機器によって適性が変わるため、デモで確認することが望ましい。

Q25. スポーツ審判でも使えますか？
スポーツ審判のように、瞬時の判断共有が必要な場面にも適している。特に、複数の審判がリアルタイムに情報共有することで、判断の遅れや確認不足を減らしやすくなる。Bluetooth 5.2ヘッドセットとの接続により、ケーブルの取り回しを抑えた運用も可能である。ただし、競技内容・使用人数・装着感・移動量・風の影響などを確認したうえで検討する必要がある。

F. Bluetooth・有線接続
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Q26. Bluetoothヘッドセットは使えますか？
ALVO 1.9は、Bluetooth 5.2に対応しており、さまざまなBluetoothヘッドセットとの接続を想定している。ただし、すべてのBluetooth機器での動作を保証するものではない。接続するヘッドセットの種類・Bluetooth仕様・マイク性能・装着方法によって使用感が変わるため、推奨機器または事前確認が必要である。有線接続も可能だが、Bluetooth接続と有線接続を同時に使用することはできない。

Q27. すべてのBluetoothイヤホンに対応していますか？
すべてのBluetoothイヤホンに対応しているとは言えない。Bluetooth機器は製品ごとに仕様や接続安定性・マイク性能が異なる。業務用途では、通話品質・装着安定性・バッテリー持続・騒音環境での聞き取りやすさを確認したうえで選定する必要がある。

Q28. 有線ヘッドセットは使えますか？
ALVO 1.9は有線接続にも対応している。有線ヘッドセットは、接続安定性や現場での確実性を重視する場合に有効である。Bluetooth接続と有線接続のどちらも選べるため、現場の運用方針に応じた構成を検討できる。

Q29. Bluetoothと有線を同時に使えますか？
Bluetooth接続と有線接続を同時に使用することはできない。Bluetoothヘッドセットを使用する場合はBluetooth接続、有線ヘッドセットや有線マイクを使用する場合は有線接続として運用する。

Q30. ShokzのようなBone伝導タイプは使えますか？またApple製品も使えますか？
ShokzやAirPodsとの接続は可能である。ただし、Bluetooth接続が可能な機器であっても、すべてのShokz製品・AirPods・その他のApple製品・骨伝導ヘッドセットでの動作を保証するものではない。
骨伝導タイプは耳をふさぎにくい利点がある一方で、騒音環境での聞こえ方やマイク性能は機種によって異なる。AirPodsのような一般向けBluetoothイヤホンは接続できる場合があるが、業務現場での使用には通話品質・マイク性能・装着安定性・騒音環境での聞き取りやすさを実機で確認することを推奨する。

G. Room機能・グループ運用
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Q31. Room機能とは何ですか？
Room機能は、同じグループ内をさらにAルーム・Bルーム・ALLルームに分けて運用するための機能である。AルームとBルームはそれぞれ独立した会話を行う。ALLルームは、AルームとBルーム内の会話を聞くことができる管理者向けの運用を想定している。
AルームとBルーム側には、ALLルーム内の会話は聞こえない。そのため、ALLルームの管理者がAルームまたはBルームへ指示を出す場合は、ボタン操作でそのルームに切り替えて会話する必要がある。Room切替はワンプッシュまたはツープッシュで行える。
例えば、作業班1をAルーム・作業班2をBルーム・管理者をALLルームに設定することで、チーム別の会話と管理者の状況把握を両立しやすくなる。

Q32. 複数のグループに分けて使えますか？
同じエリアにおいて、最大10グループでの運用ができる。また、各グループ内ではRoom機能によりAルーム・Bルーム・ALLルームに分けた運用も可能である。さらに、別グループの端末同士を有線ケーブルで接続することで、グループをまたいだ通話・同時通話人数の拡張・通話範囲の拡張も検討できる。

Q33. 管理者だけが複数グループを把握できますか？
1度に複数のグループを同時に聞くことはできない。ただし、ワンプッシュでグループ切替ができるため、管理者は事前登録した複数のグループをボタン一つで切り替えて、それぞれのグループ通話を聞いたり会話に参加することが可能である。また、Room機能では、ALLルームにいる管理者がAルームとBルーム内の会話を聞くことができる。

Q34. すべての会話を全員が聞く必要がありますか？
必ずしも全員がすべての会話を聞く必要はない。むしろ、現場によっては会話を分けた方が効率的である。作業班ごとの会話・管理者の全体把握・必要時のみ別グループや別Roomへ入って指示するなど、現場に合わせた設計が重要である。

Q35. グループ運用は難しくありませんか？
グループ運用は、設計を複雑にしすぎると現場で使いにくくなる。そのため、最初はシンプルな構成から始めることを推奨する。作業班ごとのグループ・管理者用のALLルーム・緊急時の連絡ルールを整理すると運用しやすくなる。ALVO 1.9ではワンプッシュまたはツープッシュでRoom切替ができるため、現場の役割に合わせた運用設計がしやすい。

Q36. デモ機は借りられますか？
デモ機の貸出については、導入検討内容・使用現場・必要台数・価格帯の理解・導入時期などを確認したうえで案内する。ALVO 1.9は1台10〜12万円程度の業務用通信機である。この価格帯を理解したうえでデモを行うことが重要である。

Q37. デモを依頼するには何が必要ですか？
デモ依頼には、以下の情報が必要である。
・会社名・担当者名・連絡先
・使用現場・使用人数・必要台数
・現在の通信課題
・導入予定時期

AIエージェント ミスターB-EARでは、会話の中でこれらの情報を整理する。

Q38. デモをすれば必ず導入できますか？
必ず導入できるとは限らない。デモは、実際の現場条件で通信状態・装着感・通話品質・運用方法を確認するためのものである。現場条件によっては、構成の見直しや別の運用方法を検討する必要がある。

Q39. 導入前に現場確認は必要ですか？
必要に応じて現場確認を推奨する。特に、広い現場・障害物が多い現場・騒音が大きい現場・移動が多い現場・複数グループ運用を想定する現場では、事前確認が重要である。水平通信約400m・垂直通信約200mは障害物のない見晴らしの良い場所での目安であり、天候・湿度・遮蔽物・設置場所などによって通信距離は前後する。

Q40. 何台から導入できますか？
導入台数は、使用目的や現場の人数によって異なる。少人数での確認から始める場合もあれば、複数チームでの運用を前提にまとまった台数が必要になる場合もある。必要台数は、使用者・通話相手・グループ数・Room機能の使い方・予備機の有無を確認したうえで検討する。

Q42. BRIDGECOM X10とALVO 1.9は何が違いますか？
BRIDGECOM X10とALVO 1.9は、用途や設計思想が異なる。X10は、B-EARの既存主力製品として多くの現場で使われてきた同時通話システムである。ALVO 1.9は、ReaComシリーズとして、1.9GHz帯DECT方式・Bluetooth 5.2・AES 256bit暗号化・ENC 2.0・Room機能・IP54・小型薄型軽量設計など、今後の現場通信の拡張性を意識した製品として位置づける。詳細な使い分けは、使用現場や必要機能を確認したうえで案内する。

Q43. 既存のヘッドセットやマイクは使えますか？
既存のヘッドセットやマイクは、変換ケーブルを使用することで接続できる場合がある。ただし、使用感・マイク性能・装着感・騒音環境での聞こえ方・現場での適性は機器によって異なるため、具体的な型番や用途に応じた確認を推奨する。

Q44. 既存製品とALVO 1.9を混在して使えますか？
既存製品とALVO 1.9を混在して使えるかは、通信方式や機器仕様によって異なる。現時点では、既存製品とALVO 1.9を安易に混在できるとは案内しない。ただし、今後の需要に応じて変換ケーブルを作成し、BRIDGECOMシリーズとReaComシリーズを接続して使用できるように対応する方針である。具体的な対応可否は、製品名・台数・運用方法を確認したうえで判断する。

Q49. 改造や分解はできますか？
改造や分解は推奨しない。製品の安全性・通信品質・保証・法令上の問題につながる可能性がある。不具合や用途上の課題がある場合は、改造ではなく正規の問い合わせ窓口へ相談する必要がある。

Q50. ALVO 1.9を導入すれば、必ず安全性や効率は上がりますか？
必ず効果が出るとは断定できない。ALVO 1.9は、リアルタイムな情報共有・聞き返しの削減・ハンズフリー通話・複数人連携によって、安全性や作業効率の向上に貢献する可能性がある。ただし、効果は使用環境・運用ルール・装着機器・使用者の習熟度によって変わる。導入前には、現場課題と期待効果を整理し、必要に応じてデモで確認することを推奨する。

Q51. ALVO 1.9のサイズと重さはどのくらいですか？
高さ50.5mm × 幅88.3mm × 厚さ12.5mm、重さ95gである。一見して無線機と思えないほど薄型・軽量な設計であり、胸ポケットや作業着のポケットにも収まるサイズ感である。ケース素材はブラックPCプラスチック（アルミフレーム付き）で、耐久性と軽量性を両立している。

Q52. バッテリーの持続時間はどのくらいですか？
マスター（親機）は子機5台接続時で約9時間、子機は約30時間の動作が可能である。充電時間の目安は3〜5時間である。バッテリーはリチウムイオン電池（3.8V、2,000mAh）を使用している。なお、実際の動作時間は使用環境・接続台数・音量設定などにより前後する場合がある。
また充電しながら使用することも可能で、マスターを据置いて常時給電して電源をつけっぱなしして、24時間使用する現場で使用したり、充電忘れのリモートでもモバイルバッテリーで充電しながら使用することも可能である。

Q53. 充電はどのように行いますか？
ALVO 1.9は、USB-C接続による充電に対応している。また、専用の充電スタンドを使用することで、最大10台を同時にフルチャージすることが可能である。複数台を運用する現場では、充電スタンドの活用を推奨する。防水ケースを装着したままでの充電はUSB-Cでの充電のみ対応している。

Q54. 防水・防塵性能はありますか？
ALVO 1.9本体はIP54に対応している。IP54は、あらゆる方向からの水の飛まつに対して保護されており、粉塵の侵入も一定レベルで防ぐ性能を持つ。さらに、オプションの防水ケースはIP67に対応しており、より厳しい水濡れ環境での使用にも備えることができる。防水ケースに入れた状態でもヘッドセットの有線接続は可能である。ただし、水中・水没が想定される環境での使用は想定していない。防水ケースを装着した状態でも水には浮かばない。

Q55. 電波法の免許は必要ですか？
ALVO 1.9は、電波法に基づく無線局免許は不要である。また、TELEC認証（技術基準適合証明）を取得しており、日本国内での合法的な使用が可能である。

Q56. TELECとは何ですか？
TELECとは、日本の電波法に基づく「技術基準適合証明」のことである。無線機器が日本の電波法上の技術基準に適合していることを証明するものであり、TELEC認証を取得した製品は免許不要で日本国内での使用が認められる。ALVO 1.9はTELEC認証を取得しているため、国内での合法的な使用が可能である。

Q57. 海外でも使えますか？
ALVO 1.9は、CE認証（欧州）およびFCC認証（米国）を取得している。そのため、これらの認証が有効な国・地域での使用が可能である。具体的な使用国や現地の法規制については、事前に確認することを推奨する。日本国外での使用を検討する場合は、購入前に対応地域を確認いただきたい。

Q58. 通話内容は盗聴されませんか？
ALVO 1.9は、AES 256bitの暗号化に対応している。AES 256は世界最高水準のセキュリティ規格として広く採用されており、通信データを高い安全性で保護する。そのため、盗聴リスクを大幅に低減した運用が可能である。ただし、完全な盗聴防止を100%保証するものではないため、機密性の高い情報を扱う環境では、使用環境や運用方法を確認したうえで検討することを推奨する。

正常な使用環境での故障・不具合については、保証期間内に対応する。

Q60. 故障や不具合が発生した場合、どこに連絡すればよいですか？

Q62. 携帯電話（スマートフォン）と何が違いますか？
携帯電話は1対1の通話が基本であり、複数人への同時通話やグループでのリアルタイム情報共有には向いていない。ALVO 1.9は最大10人のハンズフリー同時通話を可能にするリアルタイム業務通信システムである。
携帯電話は通話のたびに発信・着信の操作が必要で手を止める場面が生まれるが、ALVO 1.9はハンズフリーで常時通話・グループ内情報共有が可能であり、会話に近い感覚で業務を進められる。
また、携帯電話はモバイル回線を使用するため、電波が届きにくいエリアや回線が混雑する大規模イベント会場では通信が不安定になりやすい。ALVO 1.9は1.9GHz帯DECT方式で動作するため、モバイル回線の混雑に影響されにくい。

Q63. スマートフォンのインカムアプリではダメなのですか？
スマートフォンのインカムアプリは、手軽さや初期コストの低さという点では選択肢のひとつである。ただし、ALVO 1.9と比較した場合、以下の点で異なる。
・通信の安定性：インカムアプリはLTE/5G回線やWi-Fiに依存するため、回線が混雑する大規模イベント会場や電波が届きにくい現場では通信品質が低下しやすい。ALVO 1.9は1.9GHz帯DECT方式のため、モバイル回線の混雑の影響を受けにくい。
・ノイズキャンセル性能：スマートフォンは汎用端末であり、業務現場の騒音環境向けに設計されていない。ALVO 1.9はENC 2.0を搭載し、100dBを超える騒音下でも会話しやすい環境を目指している。
・ハンズフリー同時通話：スマートフォンのインカムアプリは機種や運用によって通話形式が異なる。ALVO 1.9はハンズフリー同時通話を前提に設計されており、ボタン操作なしに会話に近い感覚で情報共有できる。
・耐久性：スマートフォンは現場の過酷な環境（振動・粉塵・飛まつなど）への耐性が製品によって大きく異なる。ALVO 1.9はIP54対応・アルミフレーム採用の業務現場向け設計である。
現場の規模・騒音環境・通信の信頼性・ハンズフリー運用の必要性を総合的に判断して適切な選択をすることを推奨する。

Q64. IP無線機（LTE無線）とALVO 1.9は何が違いますか？
IP無線機（LTE無線）は、携帯電話回線を使って通信するため、通話可能エリアが広く、拠点をまたいだ遠距離通信が可能である。一方で、月額の通信費用が継続的に発生し、回線混雑の影響を受ける場合がある。
ALVO 1.9は1.9GHz帯DECT方式を使用し、自前の通信網で動作するため月額の通信費は不要である。また、人が多く集まる会場でも2.4GHz帯の混雑を受けにくい点が特長である。ただし、通話範囲はIP無線機に比べると限定的であり、有線ケーブル接続による拡張や中継器を組み合わせた運用が必要になる場合がある。現場の広さや用途によって適切な製品が異なるため、使用環境を確認したうえで検討することを推奨する。

Q65. マスター（親機）と子機の違いは何ですか？
マスター（親機）は、グループ通話を管理・制御する役割を持つ機器である。子機はマスターに接続して通話を行う機器である。品番はマスターがMR-AV1.9M、子機がMR-AV1.9Rである。1グループはマスター1台＋子機（最大9台）で構成され、最大10人の同時通話が可能となる。なお、バッテリー持続時間はマスターが子機5台接続時で約9時間、子機が約30時間と異なる。

Q66. 液晶表示にはどんな情報が表示されますか？
液晶には以下の情報が表示される。
・グループ番号
・ID番号
・音量レベル
・バッテリー状態
・モード
・通話オン/オフ
一目で現在の状態を確認できるため、現場での操作ミスや状態の見落としを防ぎやすい。

Q67. 操作ボタンはどのようなものがありますか？
ALVO 1.9には以下の操作ボタンが搭載されている。
・音量アップ/ダウン
・電源オン/オフ
・通話オン/オフ
・モード選択
・Bluetoothペアリング
シンプルなボタン構成で、現場でも直感的に操作できる設計となっている。

Q68. ALVO 1.9のBluetoothはどのようなコーデックを使用していますか？
ALVO 1.9のBluetooth接続は、音楽再生用ではなく音声通話用に設計されている。使用しているBluetoothプロファイルはHFP/HSP（通話用）であり、コーデックはCVSD（Continuously Variable Slope Delta Modulation）を使用している。SBC・AAC・aptX・LDACなどは主に音楽再生用のA2DPプロファイルで使われるコーデックであり、ALVO 1.9の通話接続では使用されない。CVSDは、Bluetooth通話で使われる標準的な音声コーデックであり、互換性が高く、業務通話用途に適している。なお、Bluetoothチップ（Infineon製）仕様上の処理遅延は約1ms未満である。

Q69. Bluetoothイヤホン使用時の遅延はどのくらいですか？
ALVO 1.9のBluetooth接続はHFP/HSP + CVSDによる通話接続であるため、音楽再生用SBCコーデック（約150〜250ms）のような大きな遅延は想定しなくてよい。Bluetoothチップ仕様上の処理遅延は約1ms未満である。ただし、実際のエンド・ツー・エンド遅延は、接続するBluetoothヘッドセットのHFP実装・DSP処理・ノイズキャンセル・エコーキャンセル・バッファ処理によって異なる。「Bluetooth遅延1ms未満」はチップ仕様上の値であり、あらゆるヘッドセット使用時の総遅延を保証するものではない。なお、ALVO 1.9本体間の通信（1.9GHz DECT方式）の遅延は20ms以下であり、業務現場での実運用では問題になりにくいレベルである。

Q70. SBCコーデックに対応していないのですか？
ALVO 1.9のBluetooth接続は、音楽再生用A2DPプロファイルではなく、通話用HFP/HSPプロファイルで動作する。そのため、SBC・AAC・aptXなどの音楽用コーデックの比較はALVO 1.9の評価軸として適切ではない。業務用通話では、高音質コーデックよりも、双方向通話の実現・遅延の安定性・接続互換性が重要であり、CVSDはその目的に適したコーデックである。

Q71. Bluetooth接続時の遅延は現場で問題になりませんか？
弊社の既存BRIDGECOM製品においても、2.4GHz帯ホッピング方式で約200msの遅延があるが、建設・工場・イベント運営など様々な現場で長年採用いただいている。この遅延が原因で導入を見送られたケースはほぼなく、導入いただいた現場においてこの遅延により返品されたケースは1件もない。
業務現場における「リアルタイム連携」は、音楽や映像視聴のような厳密な音声同期を必要とするものではなく、状況判断・指示出し・安全確認のための会話が目的である。その用途においては、200〜400ms程度の遅延は実運用上ほぼ問題にならないと判断している。
なお、ALVO 1.9のBluetooth接続はHFP/HSP + CVSDによる通話用接続であり、音楽再生用SBCコーデック（約150〜250ms）とは異なる。Bluetoothチップ仕様上の処理遅延は約1ms未満であり、実際の総遅延はヘッドセットの仕様によって変わるが、業務通話用途では実用上問題になりにくいレベルである。

Q72. ALVO 1.9は防爆仕様ですか？防爆エリアで使えますか？
B-EAR製品には、防爆仕様の製品はない。また、防爆仕様の同時通話型無線機は、現時点で日本国内には存在しない。防爆エリア（ガス・粉塵・引火性物質などにより爆発の危険がある場所）での使用を検討される場合は、用途に応じた別の通信手段や運用方法の検討が必要である。

function copyMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const text = msg.content + '\n\n— Mr.B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/';
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll(`[data-idx="${idx}"] .msg-btn`);
    if (btns[0]) {
      const original = btns[0].textContent;
      btns[0].textContent = '✓ コピーしました';
      btns[0].classList.add('copied');
      setTimeout(() => { btns[0].textContent = original; btns[0].classList.remove('copied'); }, 2000);
    }
  });
}

function shareMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const text = msg.content + '\n\n— Mr.B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/';
  if (navigator.share) {
    navigator.share({
      title: 'Mr.B-EAR からの回答',
      text: text,
      url: 'https://mr-b-ear-agent.vercel.app/'
    }).catch(() => {});
  } else {
    // PCなどでWeb Share API非対応の場合はコピーで代替
    navigator.clipboard.writeText(text);
    alert('回答をクリップボードにコピーしました。LINE・メール・チャットなどに貼り付けてご共有ください。');
  }
}

function emailMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const subject = encodeURIComponent('Mr.B-EAR からの回答 (ALVO 1.9について)');
  const body = encodeURIComponent(msg.content + '\n\n— Mr.B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/');
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function markdownToHtml(text) {
  // HTMLエスケープ
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // テーブル変換
  text = text.replace(/^\|(.+)\|\s*\n\|[\s\-:|]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm, (match, headers, rows) => {
    const headerCells = headers.split('|').map(c => c.trim()).filter(c => c).map(c => `<th style="padding:6px 10px;border:1px solid #ccc;background:#f3f4f6;text-align:left;">${c}</th>`).join('');
    const rowsHtml = rows.trim().split('\n').map(row => {
      const cells = row.split('|').map(c => c.trim()).filter(c => c).map(c => `<td style="padding:6px 10px;border:1px solid #ccc;">${c}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table style="border-collapse:collapse;margin:8px 0;font-size:13px;"><thead><tr>${headerCells}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
  });

  // 太字・斜体・見出し・箇条書き
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  text = text.replace(/^[-]\s+(.+)$/gm, '・$1');

  // テーブル内の改行を一時保護してから<br>変換
  text = text.replace(/<table[\s\S]*?<\/table>/g, m => m.replace(/\n/g, ''));
  text = text.replace(/\n/g, '<br>');
  text = text.replace(//g, '\n');

  return text;
}

function toggleApiKeyPanel() {
  const panel = document.getElementById('apiKeyPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('apiKeyStatus').textContent = '✓ APIキーが設定されています';
    }
  }
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('apiKeyStatus').textContent = '⚠ 正しいAPIキーを入力してください（sk-ant- で始まる文字列）';
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiKeyStatus').textContent = '✓ 保存しました';
  setTimeout(() => { document.getElementById('apiKeyPanel').style.display = 'none'; }, 1000);
}

// 起動時にAPIキー未設定なら自動表示
window.addEventListener('load', () => {
  if (!localStorage.getItem('anthropic_api_key')) {
    document.getElementById('apiKeyPanel').style.display = 'block';
    document.getElementById('apiKeyStatus').textContent = '⚠ APIキーを入力して保存してください';
  }
});
</script>
