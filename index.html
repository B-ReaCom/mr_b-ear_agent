<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; height: 100dvh; overflow: hidden; }
body { font-family: 'Noto Sans JP', sans-serif; height: 100%; height: 100dvh; display: flex; flex-direction: column; background: #f5f5f5; overflow: hidden; }
.header { background: #1a1a1a; padding: 0 1.5rem; display: flex; align-items: center; gap: 0; border-bottom: 2px solid #E8A020; height: 80px; }
.brand { margin-left: 1.5rem; }
.header-actions { display: flex; align-items: center; gap: 0; margin-left: 20px; flex: 1; }
.header-actions #langSelect { margin-left: 20px; }
.header-actions .status { margin-left: auto; }
.header-actions #apiKeyBtn { margin-left: 8px; }
.logo { width: 64px; height: 64px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.title-tag { font-family: 'Barlow', sans-serif; font-size: 11px; color: #E8A020; font-style: italic; letter-spacing: 0.04em; line-height: 1; white-space: nowrap; margin-bottom: 4px; }
.title-ruby { font-family: 'Noto Sans JP', sans-serif; font-size: 6px; font-weight: 500; color: #ffffff; letter-spacing: 0.12em; line-height: 0.7; white-space: nowrap; margin-bottom: 0; }
.title { font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 20px; color: #ffffff; letter-spacing: 0.02em; line-height: 1; white-space: nowrap; margin-top: 0; }
.status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
.status-text { font-size: 12px; color: #9ca3af; }
.messages { flex: 1; overflow-y: auto; padding: 1.5rem 1.5rem 140px 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.welcome { text-align: center; margin-top: 2rem; }
.welcome-icon-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
.welcome-icon { display: inline-block; }
.welcome-icon > img.product-img { height: 180px; width: auto; display: block; }
.welcome-text-wrap { display: flex; justify-content: center; margin-bottom: 2rem; padding: 0 1rem; }
.welcome-text { text-align: left; }
.faq-panel { position: fixed; top: 0; right: 0; width: 360px; max-width: 88vw; height: 100%; background: #ffffff; box-shadow: -4px 0 20px rgba(0,0,0,0.18); z-index: 1000; transform: translateX(100%); transition: transform 0.28s ease; display: flex; flex-direction: column; }
.faq-panel.open { transform: translateX(0); }
.faq-panel-header { background: #1a1a1a; color: #fff; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; border-bottom: 2px solid #E8A020; }
.faq-close-btn { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0 6px; line-height: 1; }
.faq-panel-list { overflow-y: auto; padding: 12px 14px; flex: 1; }
.faq-panel-item { width: 100%; text-align: left; padding: 14px 14px; margin-bottom: 8px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; color: #1f2937; font-size: 14px; line-height: 1.5; cursor: pointer; transition: all 0.15s; }
.faq-panel-item:hover { background: #E8A020; color: #1a1a1a; border-color: #E8A020; }
.faq-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 999; display: none; }
.faq-overlay.open { display: block; }
.welcome-tag { font-size: 16px; color: #4b5563; letter-spacing: 0.04em; margin-bottom: 4px; font-weight: 500; }
.welcome-heading { font-family: 'Noto Sans JP', sans-serif; font-size: 36px; font-weight: 700; color: #111827; line-height: 1.25; margin-bottom: 0; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin: 0 auto; }
.suggestion-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid #d1d5db; background: white; color: #1f2937; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.suggestion-btn:hover { background: #E8A020; color: #1a1a1a; border-color: #E8A020; }
.message { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.25s ease forwards; }
.message.user { justify-content: flex-end; }
.avatar { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: contain; }
.avatar.assistant { background: transparent; }
.avatar.user { background: transparent; }
.bubble { max-width: 72%; padding: 12px 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.bubble.user { border-radius: 18px 18px 4px 18px; background: #E8A020; color: #1a1a1a; }
.bubble.assistant { border-radius: 18px 18px 18px 4px; background: white; color: #1f2937; border: 0.5px solid #e5e7eb; }
.message.system { justify-content: center; padding: 0 1rem; }
.bubble.system { max-width: 90%; border-radius: 10px; background: #fef3c7; color: #92400e; border: 0.5px solid #fcd34d; font-size: 13px; padding: 10px 14px; text-align: center; }
.bubble.user.greyed { background: #e5e7eb; color: #6b7280; opacity: 0.6; }
.msg-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f3f4f6; flex-wrap: wrap; }
.msg-btn { background: #f9fafb; border: 1px solid #e5e7eb; color: #4b5563; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.msg-btn:hover { background: #E8A020; color: #1a1a1a; border-color: #E8A020; }
.msg-btn.copied { background: #10b981; color: white; border-color: #10b981; }
.loading { display: flex; gap: 5px; align-items: center; padding: 12px 20px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #E8A020; animation: dots 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 1rem 1.5rem; border-top: 0.5px solid #e5e7eb; background: white; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.input-container { display: flex; gap: 10px; align-items: flex-end; }
.chat-input { flex: 1; resize: none; padding: 12px 16px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; background: #f9fafb; color: #1f2937; min-height: 48px; max-height: 120px; line-height: 1.5; transition: border-color 0.15s; }
.chat-input:focus { outline: none; border-color: #E8A020; }
.send-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; flex-shrink: 0; }
.send-btn .bear-icon { width: 75px; height: 75px; object-fit: contain; transition: transform 0.2s; }
.send-btn:hover:not(:disabled) .bear-icon { transform: scale(1.1) rotate(-5deg); }
.send-btn:active:not(:disabled) .bear-icon { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.disclaimer { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 8px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes dots { 0%,80%,100%{opacity:0} 40%{opacity:1} }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
@media (max-width: 768px) {
  .welcome-icon > img.product-img { height: 140px; width: auto; }
  .welcome-tag { font-size: 13px; }
  .welcome-heading { font-size: 28px; }
  .avatar { width: 55px; height: 55px; }
  .header { padding: 0 0.75rem; gap: 0; height: 72px; }
  .brand { margin-left: 0.75rem; }
  .header-actions { margin-left: 7px; gap: 0; }
  .header-actions #langSelect { margin-left: 15px; }
  .header-actions #apiKeyBtn { margin-left: 6px; }
  .title-tag { font-size: 9px; margin-bottom: 3px; }
  .title-ruby { font-size: 5.5px; }
  .title { font-size: 16px; margin-top: 0; line-height: 1; }
  .logo { width: 56px; height: 56px; }
  .status-text { display: none; }
  #langSelect { font-size: 10px; padding: 3px 5px; max-width: 80px; }
  #apiKeyBtn { font-size: 10px; padding: 3px 6px; }
}
</style>
</head>

## 第0.5章：B-EAR導入の意義・選ばれる理由・現場（重要FAQ）

これらの質問は来店・問い合わせの起点となる中核FAQ。同種の質問が来た場合は、以下の回答内容を必ず活かすこと。

### Q. 今の無線機から乗り換える意味ある？

はい、あります。

ただし、すべての現場で今の無線機を置き換える必要があるわけではありません。従来の無線機にも優位性がある点もあり、例えば広い範囲に一斉連絡できたり、安価だったりと用途によっては今でも有効です。

一方で、B-EARが得意としているのは、「チーム内でのリアルタイムコミュニケーション」で、さらに騒音下・両手作業中・即時判断が必要な現場で、押しボタンなしに会話できる通信環境です。

たとえば、次のような課題がある現場では、乗り換える意味があります。

- 無線機のPTTボタンを押す余裕がない
- 騒音で相手の声が聞き取りにくい
- 騒音下での無線機は耳が痛くなり、ストレスが溜まる
- 指示・確認のたびに作業が止まる
- 「聞こえたつもり」「伝えたつもり」が事故やミスにつながる
- 複数人でリアルタイムに会話したい

B-EARは、単なる無線機の代替ではなく、現場の判断・安全・作業効率を支えるための同時通話システムです。そのため、「ただ連絡できればいい」現場ではなく、"会話の質"が作業品質や安全に直結する現場で特に効果を発揮します。

### Q. なぜB-EARを選ぶ会社が増えてる？

理由は大きく3つあります。

**1つ目は、騒音下でも会話しやすいことです。**
建設現場、工場、重機周辺、イベント会場、スポーツ現場などでは、周囲の音が大きく、通常の無線機では聞き返しや伝達ミスが起きやすく、そしてまたノイズキャンセラーのあまり効いていない無線機では必要以上に大きな音を出さなければならず、耳が痛くなったり、難聴の原因にもなります。B-EARは、そうした現場での会話を前提に設計されています。

**2つ目は、両手を使ったままタイムラグなく話せることです。**
従来の無線機のようにボタンを押して話す必要がないため、作業中・移動中・確認中でも会話しやすくなります。タイムラグがほとんどなく、1秒が命取りとなるような現場では無くてはならない存在です。

**3つ目は、導入実績があることです。**
B-EAR製品は、警察、海上保安庁、消防、自衛隊、鉄道、道路、発電所関連、スポーツ、イベント、建設・産業分野など、厳しい環境で使われてきました。

つまり、B-EARは「便利そうだから選ばれている」というより、現場で本当に聞こえる・話せる通信が必要な会社に選ばれているというのが近いです。

### Q. B-EAR導入後に一番驚かれるのは？

一番多いのは、「普通に会話できること」への驚きです。

無線機に慣れている方ほど、最初は
- 「ボタンを押さなくていいの？」
- 「同時通話が複数人で会話なんてできるの？」
- 「100dBを超える騒音の中で、騒音が入らないってホント？」

と半信半疑で試されます。

しかし実際に使うと、
- 電話のように自然に話せる
- 両手を使ったまま会話できる
- 騒音下なのに声がクリアに聞こえる

という点に驚かれることが多いです。

特に、重機・機械音・歓声・風・エンジン音などがある現場では、「今までの無線機とは別物ですね」と言われることがあります。

B-EARが目指しているのは、単に声を届けることではありません。**現場で必要な判断を、必要な瞬間に、止めずに伝えること**です。

### Q. B-EARはどんな現場で導入されている？

B-EAR製品は、主に騒音・距離・安全確認・チーム連携が重要な現場で導入されています。

代表的な導入・使用分野は以下です。

- 建設現場
- 道路・高速道路関連作業
- 鉄道関連作業
- 工場・製造現場
- 発電所・インフラ関連現場
- 消防・救助分野
- 警察・海上保安庁などの公的機関
- スポーツ審判・競技運営
- イベント・ライブ・会場運営
- 重機・車両・船舶まわりの作業
- 騒音が大きい特殊作業環境

B-EARの特徴は、一般的なオフィスや静かな環境ではなく、「声が届きにくい」「手が離せない」「判断が遅れると危険」という現場で強みを発揮することです。

使用現場によって、適した製品や構成が変わるため、導入前には使用人数、現場の広さ、騒音の種類、屋内外、移動の有無などを確認することをおすすめしています。

## 第2章：B-EAR共通の基礎情報（全製品共通）

### 通話方式・ハンズフリー同時通話

**Q. PTT無線機との違いは？**
PTT（Push-to-Talk）無線機は、ボタンを押している間だけ話す方式で、話す順番が必要になる。複数人が同時に状況を共有する場面ではテンポが遅くなる。

B-EAR製品は、ハンズフリー同時通話により会話しながら判断・連携できることを目的としている。作業中に手を止めず、必要な情報をその場で共有できる点が大きな違いである。

**Q. 作業中に手を使わず会話できるか？**
B-EAR製品はハンズフリーでの会話を想定している。重機操作・工具作業・点検作業・スポーツ審判・介護や医療作業など、手を使いながら連携が必要な現場で有効。具体的な操作性は使用するヘッドセットや装着方法により変わるため、現場に合った構成確認が必要。

**Q. 複数人で同時に話すと混乱しませんか？**
最初は会話が重なって混乱するのではないかと思われることが多い。しかし、現場ごとに役割・発話ルール・グループ構成を整理することで、従来の単信通話に比べて効率的に情報共有できる。管理者・作業者・監視担当・オペレーターなどの役割が分かれている現場では、誰が誰と話すべきかを事前に設計することで効果を発揮しやすい。

**Q. 常時通話にすると不要な会話まで聞こえる？**
通話のオン・オフは本機のボタン操作で切り替えられる。マイク側のミュート機能で不要な音声が伝わることを抑えられる。グループ分けや通話ルールを整理し、現場に合った通信範囲を設計することを推奨。

### 通信安定性・距離の考え方

**Q. 通信が絶対に途切れない？**
絶対に途切れないとは言えない。無線通信は使用環境・距離・遮蔽物・電波状況・機器配置・天候・湿度などの影響を受ける。導入前に現場条件を確認し、必要に応じてデモで検証することが重要。

**Q. 移動しながら使える？**
使用は想定されるが、移動速度・周囲の人や車両・遮蔽物・電波環境によって通信状態は変わる。スポーツ審判・重機周辺・イベント会場・工事現場など動きながら会話する場面でも特長が活きやすい。事前に実運用に近い条件で確認することを推奨。

**Q. 屋内でも使えるか？**
使用できる可能性はあるが、建物の構造・壁の材質・階層・鉄骨・設備・電波環境によって通信状態は変わる。屋内利用では見通し・遮蔽物・使用人数・移動範囲を確認したうえで適切な構成を検討する必要がある。実際の使用環境に近い条件での確認を推奨。

### Bluetooth・有線接続（ALVO 1.9 限定）

※BRIDGECOMシリーズはBluetooth非対応。

**Q26. Bluetoothヘッドセットは使えるか？**（ALVO 1.9）
ALVO 1.9はBluetooth 5.2に対応。さまざまなBluetoothヘッドセットとの接続を想定しているが、すべての機器での動作を保証するものではない。Bluetooth接続と有線接続を同時に使用することはできない。

**Q. すべてのBluetoothイヤホンに対応？**
すべての対応とは言えない。業務用途では通話品質・装着安定性・バッテリー持続・騒音環境での聞き取りやすさを確認したうえで選定する必要がある。

**Q. ShokzのようなBone伝導タイプ／Apple製品は？**
ShokzやAirPodsとの接続は可能だが、すべてのShokz製品・AirPods・骨伝導ヘッドセットでの動作を保証するものではない。骨伝導タイプは耳をふさぎにくい利点がある一方、騒音環境での聞こえ方やマイク性能は機種によって異なる。AirPodsのような一般向けBluetoothイヤホンは業務現場での使用には実機確認を推奨。

**Q. Bluetooth接続の遅延は問題ないか？**（ALVO 1.9）
ALVO 1.9のBluetooth接続は通話用HFP/HSP + CVSDコーデック。Bluetoothチップ仕様上の処理遅延は約1ms未満。実際のエンド・ツー・エンド遅延はヘッドセット側の実装に依存するが、業務通話用途では実用上問題になりにくいレベル。

なお、ALVO 1.9本体間（1.9GHz DECT）の遅延は20ms以下、再接続時間は50ms未満。

**補足**: 既存BRIDGECOM製品（2.4GHz帯ホッピング方式）でも約200msの遅延があるが、建設・工場・イベント運営など長年採用されており、この遅延を理由とした返品・見送りはほぼない。業務現場での「リアルタイム連携」は音楽視聴のような厳密な同期を必要とせず、状況判断・指示出し・安全確認のための会話用途では200〜400ms程度の遅延は実用上問題にならない。

### ノイズキャンセル・騒音環境

**Q. 騒音の大きい現場でも使える？**
製品ごとに対応が異なる：
- ALVO 1.9: ENC 2.0搭載、自社テストで100dB超騒音下でも通話可能（ON/OFF切替可）
- X10アスリート: 100dB対応ノイズキャンセル
- その他BRIDGECOM: 専用ブームマイク・咽喉マイクの組み合わせで対応

**Q. 100%ノイズを消せる？**
100%消すことはできない。一般的な環境ノイズは大きく抑制できるが、騒音の種類・大きさ・マイク位置・使用ヘッドセットによって効果は異なるため、事前確認を推奨。

**Q. 工場・プラント・重機周辺で使える？**
活きやすい現場である。機械音・金属音・反響音・圧縮空気音など騒音の種類が多様なため、現場の騒音条件に合ったヘッドセットやマイク構成を選ぶことが重要。重機周辺ではオペレーターと誘導員・現場監督・作業員のリアルタイム会話が安全確認・作業効率に直結する。

### スマートフォン・他通信手段との違い

**Q. 携帯電話／インカムアプリとの違いは？**
- 同時通話: 携帯電話は1対1。B-EARは多人数同時通話。
- 通信安定性: モバイル回線（LTE/5G）は混雑する大規模会場で不安定。B-EARは自前の通信網で混雑の影響を受けにくい。
- ハンズフリー: 携帯は発信・着信操作が必要。B-EARは常時通話・グループ内情報共有が可能。
- ノイズキャンセル: 汎用端末は業務騒音環境向けに設計されていない。B-EARは騒音現場専用設計。
- 耐久性: 業務現場の振動・粉塵・飛まつへの耐性が大きく異なる。

**Q. IP無線機（LTE無線）との違いは？**
- 通話エリア: IP無線機は携帯回線で広範囲・拠点間通信が可能。B-EARは自前の通信網で限定的（中継ケーブル・中継器で拡張可）。
- コスト: IP無線機は月額通信費が継続的に発生。B-EARは通信費不要。
- 混雑耐性: IP無線機は回線混雑の影響を受ける。B-EARは1.9GHz帯DECT（ALVO）で2.4GHz帯混雑を回避。

### セキュリティ

- ALVO 1.9: AES 256bit暗号化（世界最高水準）
- BRIDGECOM X10/X10コンパクト: セキュリティコード4桁（0-9・A-F、最大65,536通り）
- 完全な盗聴防止を100%保証するものではないため、機密性の高い情報を扱う環境では使用環境・運用方法の確認を推奨

### 法規制・認証

**Q. 電波法の免許は必要？**
全製品とも、無線局免許は不要。日本国内で合法的に使用可能。
- ALVO 1.9: TELEC認証（技術基準適合証明）取得、CE（欧州）・FCC（米国）認証取得
- BRIDGECOM: 技術基準適合証明取得、製品により FCC・CE・RoHS 取得

**Q. 海外で使える？**
ALVO 1.9はCE・FCC認証を取得。これらの認証が有効な国・地域での使用が可能。日本国外での使用を検討する場合は、購入前に対応地域を確認。

### 防爆対応

B-EAR製品には防爆仕様の製品はない。また、防爆仕様の同時通話型無線機は、現時点で日本国内には存在しない。防爆エリア（ガス・粉塵・引火性物質などにより爆発の危険がある場所）での使用には、用途に応じた別の通信手段や運用方法の検討が必要。

## 第3章：ReaCom ALVO 1.9 詳細

### A. 製品概要

**Q1. ReaCom ALVO 1.9とは？**
ReaCom ALVO 1.9は、B-EARが展開する業務現場向けのリアルタイムワイヤレスコミュニケーションシステム。販売開始は2026年8月予定。現時点ではすぐの導入はBRIDGECOMシリーズから選定する。

主な特長：
- 1.9GHz帯DECT方式（2.4GHz帯混雑の影響を受けにくい）
- ENC 2.0ノイズキャンセル（100dB超環境でも通話可能）
- AES 256bit暗号化
- Bluetooth 5.2対応＋有線接続対応
- 本体IP54／防水ケースIP67
- 95g・H50.5×W88.3×D12.5mmの薄型軽量設計

**ALVO 1.9のサブタイトル**「Stop Shouting. Start Talking.」は、騒音の中で大声を張り上げる現場から、自然に会話しながら判断できる現場へ変えるという製品の設計思想を表す。会社の経営理念ではなくALVO 1.9固有のメッセージである。

**Q2. ReaComの意味は？**
Real-time Wireless Communication をもとにした名称。「リアルタイム性」「確実な意思疎通」「業務遂行のための通信」「常につながっている通信」を表現。

**Q. ALVO 1.9と従来の無線機の違い**
- 据え置き親機が不要、ハンズフリー同時通話可能
- 1グループ最大10台同時通話／同一エリア最大10グループ
- 別グループの本機同士を有線ケーブルで接続することで、別グループとも同時通話・通話範囲を拡張可能
- ENC 2.0、AES 256bit、Bluetooth 5.2、IP54、Room機能など、業務現場のための機能を集約

### B. 主要スペック

- 本体サイズ: 高さ50.5×幅88.3×厚さ12.5mm、重量95g
- ケース素材: ブラックPCプラスチック（アルミフレーム付き）
- 送信出力電力: 220mW
- 再接続時間: 50ms未満
- 本体間遅延: 20ms以下（1.9GHz DECT）
- Bluetoothプロファイル: HFP/HSP（通話用）、コーデック CVSD
- バッテリー: リチウムイオン電池 3.8V／2,000mAh
- 連続通話時間: マスター約9時間 / 子機約30時間
- 充電時間: 3〜5時間
- 充電方式: USB-C接続。専用充電スタンドで最大10台（マスター1＋子機9）同時充電可能

- 防水・防塵: 本体IP54／オプション防水ケースIP67（防水ケース装着時もUSB-C充電・有線接続可能。水中・水没用途は対象外）
- 動作温度: -10〜+60℃（推定／ハンドブック参照）

### C. 操作・表示

液晶表示の項目: グループ番号、ID番号、音量レベル、バッテリー状態、モード、通話オン/オフ
操作ボタン: 音量アップ/ダウン、電源オン/オフ、通話オン/オフ、モード選択、Bluetoothペアリング
ノイズキャンセラー: ENC 2.0 ON/OFF切替可

### D. マスター（親機）と子機

- マスター MR-AV1.9M: グループ通話を管理・制御する親機
- 子機 MR-AV1.9R: マスターに接続して通話する機器
- 1グループ＝マスター1台＋子機（最大9台）＝最大10人同時通話
- マスター・子機は機種が分かれており、後から役割切替不可（BRIDGECOM X10との大きな違い）

### E. Room機能（ALVO 1.9 独自機能）

同じグループ内をさらに Aルーム・Bルーム・ALLルーム に分けて運用する機能。

- AルームとBルームはそれぞれ独立した会話
- ALLルームはAルーム・Bルーム両方の会話を聞ける管理者向け
- AルームとBルームには、ALLルーム内の会話は聞こえない
- ALL→A／B への指示はボタン操作でルーム切替（ワンプッシュ／ツープッシュ）

例：作業班1=Aルーム／作業班2=Bルーム／管理者=ALLルーム → チーム別会話と管理者の状況把握を両立

### F. グループ運用

- 同一エリア最大10グループでの運用が可能
- 各グループ内でRoom機能（A/B/ALL）も併用可能
- 別グループの端末同士を有線ケーブルで接続することで、グループをまたいだ通話・同時通話人数の拡張・通話範囲の拡張が可能
- 管理者は事前登録した複数グループをワンプッシュで切替可能（同時に複数グループを聞くことは不可）
- 運用設計は最初はシンプルに。ワンプッシュ／ツープッシュでRoom切替が可能

### G. 通話距離（ALVO 1.9）

見通しの良い場所で **水平 半径約400m／垂直 約200m** が目安。
通話距離はあくまで「障害物のない見晴らしの良い場所での目安」です。天候・湿度・遮蔽物・建物構造・人や車両の動き・設置場所・電波環境などにより前後する。
別グループの端末同士を有線ケーブルで接続することで、通話距離をさらに延長することが可能です。専用中継器も開発中で今後の販売を予定。

## 第12章：実装事例

### 事例①：大型半導体工場建設現場（X10）
広大な半導体工場の建設現場で12基のタワークレーンが同時稼働。低層ながら横に非常に広い大規模工場建設現場。
課題: 周辺の強い電波環境で他社製無線機では通信が安定しない。
解決: X10では通信障害が発生せず、現場内で安定通話を実現。
ポイント: 高層対応ではなく、「広大な平面エリアに多数の作業者・重機・クレーンが存在する現場」での実績。
業界: 建設業、半導体製造業

### 事例②：地上と地下をつなぐ特殊工事現場（X10）
地上と地下が分断された工事現場。地下空間が複数に分かれている。
機材配置: 開口部の地上側にマスター機、地下側にサブマスター機を設置。さらに地下奥では子機同士を中継接続ケーブルで別グループへ接続。
結果: 地上・地下・地下内部の複数エリアを一つの通信網としてつなげ、入り組んだ地下空間でも作業員同士がリアルタイムにハンズフリー同時通話できる環境を構築。
業界: 土木業、インフラ補修

### 事例③：下水管補修・地盤沈下対策工事（X10コンパクト + X10）
老朽化した下水管・地下インフラの補修工事。
機材構成: 作業員（地下）はX10コンパクトをヘルメット装着、マスター（X10）はタラップの地上側に括り付け、サブマスター（X10）はタラップの地下側に括り付け。
結果: 作業員がボタンを押さなくても地上側と常時会話可能。地下の声や状況音を地上側がリアルタイムで確認でき、異変に早く気づける。騒音下でも声がクリアで地上監視者のストレスも軽減。
業界: 土木業、インフラ補修

### 事例④：トンネル掘削現場（X10/X10コンパクト + 咽喉マイク）
トンネル掘削現場は粉塵・反響・重機騒音で通常会話が成立しない。防塵マスク必須のため通常マイクでは声を拾いにくい。
解決: 咽喉マイクを使用。口元が防塵マスクで覆われていても作業員の声を通信に乗せられる。
意義: B-EAR製品が単なる無線機ではなく「過酷な現場で人の声を届けるための通信システム」であることを示す重要なケース。
業界: トンネル工事、解体業

// ===== レート制限機能 =====
// セッション設定
const RATE_LIMIT_CONFIG = {
  sessionDurationMs: 20 * 60 * 1000,    // 20分セッション
  maxQuestionsPerSession: 20,            // 1セッション最大20質問
  cooldownMs: 10 * 1000,                 // 10秒クールダウン
  duplicateBlockCount: 3,                // 同一質問3回目以降ブロック
  blockedDurationMs: 30 * 60 * 1000      // 制限超過後30分ブロック
};

function getRateLimitData() {
  try {
    const data = JSON.parse(localStorage.getItem('rate_limit_data') || '{}');
    if (!data.sessionStart) data.sessionStart = Date.now();
    if (!data.questions) data.questions = [];
    if (!data.blockedUntil) data.blockedUntil = 0;
    return data;
  } catch {
    return { sessionStart: Date.now(), questions: [], blockedUntil: 0 };
  }
}

function saveRateLimitData(data) {
  try { localStorage.setItem('rate_limit_data', JSON.stringify(data)); } catch {}
}

function checkRateLimit(questionText) {
  const now = Date.now();
  const data = getRateLimitData();

  // ブロック中チェック
  if (data.blockedUntil > now) {
    const remainingMin = Math.ceil((data.blockedUntil - now) / 60000);
    return { allowed: false, reason: `ご利用上限に達しました。あと約${remainingMin}分後に再度お試しください。` };
  }

  // セッション期限切れなら新セッションへリセット
  if (now - data.sessionStart > RATE_LIMIT_CONFIG.sessionDurationMs) {
    data.sessionStart = now;
    data.questions = [];
    data.blockedUntil = 0;
  }

  // クールダウンチェック（cooldownMs 以内の連続送信）
  if (data.questions.length > 0) {
    const lastQuestion = data.questions[data.questions.length - 1];
    const elapsed = now - lastQuestion.time;
    if (elapsed < RATE_LIMIT_CONFIG.cooldownMs) {
      const wait = Math.ceil((RATE_LIMIT_CONFIG.cooldownMs - elapsed) / 1000);
      return { allowed: false, reason: `送信が早すぎます。${wait}秒後に再度お試しください。` };
    }
  }

  // 同一質問繰り返しチェック（3回目以降ブロック）
  const normalized = questionText.trim().toLowerCase().replace(/\s+/g, '');
  const sameCount = data.questions.filter(q => q.normalized === normalized).length;
  if (sameCount >= RATE_LIMIT_CONFIG.duplicateBlockCount - 1) {
    return { allowed: false, reason: '同じ質問が繰り返されています。別のご質問をお試しください。' };
  }

  // セッション質問数チェック
  if (data.questions.length >= RATE_LIMIT_CONFIG.maxQuestionsPerSession) {
    data.blockedUntil = now + RATE_LIMIT_CONFIG.blockedDurationMs;
    saveRateLimitData(data);
    return { allowed: false, reason: '30分後に再度お試しください。（セッションの質問上限に達しました）' };
  }

  return { allowed: true, data };
}

function recordQuestion(questionText) {
  const data = getRateLimitData();
  const normalized = questionText.trim().toLowerCase().replace(/\s+/g, '');
  data.questions.push({ time: Date.now(), normalized });
  saveRateLimitData(data);
}

// ===== Claude API 呼び出しヘルパー =====
// USE_SERVER_PROXY = true の場合：サーバー側Edge Function経由（推奨・IP制限あり）
// USE_SERVER_PROXY = false の場合：クライアントから直接Anthropic API呼び出し（フォールバック用）
const USE_SERVER_PROXY = true;

async function callClaudeAPI(payload) {
  if (USE_SERVER_PROXY) {
    // サーバー側プロキシ経由（推奨）
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return { response, data: await response.json() };
  } else {
    // 直接Anthropic API呼び出し（フォールバック）
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': localStorage.getItem('anthropic_api_key') || '',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(payload)
    });
    return { response, data: await response.json() };
  }
}

// ===== Haiku 4.5 による質問妥当性事前判定（レベル4） =====
async function judgeQuestionRelevance(questionText) {
  try {
    const { data } = await callClaudeAPI({
      model: 'claude-haiku-4-5',
      max_tokens: 10,
      system: 'あなたは質問の妥当性を判定する分類器です。判定が曖昧な場合は必ず「YES」と判定してください。以下のいずれかに少しでも関連する場合は「YES」のみ、明らかに無関係（天気予報、政治ニュース、占い、ゲーム、料理レシピ、コード作成、数学計算、無意味な文字列「あああ」「aaa」「123」等のみ）の場合は「NO」のみ回答。「YES」または「NO」以外は出力禁止。\n\n【YESと判定すべきトピック】\n1. B-EAR製品全般（製品紹介、製品ラインナップ、ALVO 1.9、BRIDGECOM全機種（X10/X10コンパクト/X5/X10アスリート/LT/R2）、VoiSniper、咽喉マイク 等）\n2. 業務用無線機・トランシーバー・インカム・同時通話・ハンズフリー・現場通信全般\n3. 価格・スペック・性能・通話距離・ノイズキャンセル・防水・バッテリー・Bluetooth\n4. 株式会社ベアリッジ／B-EAR の会社情報・代表・経営理念・事業内容・導入実績\n5. 採用・求人・キャリア・就職・転職・募集・働きたい・仕事に興味\n6. 勤務地・本社・オフィス・所在地・住所\n7. レンタル・貸出・リース・デモ機\n8. 代理店紹介・販売代理店・取扱店・見積・問い合わせ・連絡先\n9. 修理・サポート・保証・故障・トラブル\n10. その他、業務通信や現場業務（建設・工場・スポーツ・イベント・トンネル・港湾 等）に関する質問',
      messages: [{ role: 'user', content: questionText }]
    });
    const judgment = (data.content?.find(b => b.type === 'text')?.text || '').trim();
    const upper = judgment.toUpperCase();
    // 「NO」を含む応答パターンを拒否（多言語対応・あいまいな表現も含む）
    const isRejected = (
      upper.startsWith('NO') ||
      upper === 'N' ||
      judgment.startsWith('いいえ') ||
      judgment.includes('無関係') ||
      judgment.includes('関係ない') ||
      judgment.includes('不適切') ||
      upper.includes('NOT RELATED') ||
      upper.includes('NOT RELEVANT')
    );
    // 判定が拒否を示している場合のみリジェクト（あいまいな場合は通す）
    return !isRejected;
  } catch {
    // 判定APIエラー時は安全側で通す（ユーザー体験優先）
    return true;
  }
}

// 会話履歴の最大保持数（直近10往復＝20メッセージ、コスト爆増を防ぐ）
const MAX_API_HISTORY = 20;

// API送信用メッセージを準備（_display_only=true のメッセージを除外、履歴を制限）
function prepareApiMessages() {
  return messages
    .filter(m => !m._display_only)
    .map(m => ({ role: m.role, content: m.content }))
    .slice(-MAX_API_HISTORY);
}

async function sendMessage(text) {
  const userText = text || inputEl.value.trim();
  if (!userText || loading) return;

  // レート制限チェック
  const limitCheck = checkRateLimit(userText);
  if (!limitCheck.allowed) {
    // 表示専用：API には送信しない（_display_only フラグで除外）
    messages.push({ role: 'user', content: userText, _display_only: true });
    messages.push({ role: 'assistant', content: limitCheck.reason, _display_only: true, _system: true });
    renderMessages();
    inputEl.value = '';
    inputEl.style.height = '48px';
    return;
  }

  // 質問を記録
  recordQuestion(userText);

  inputEl.value = '';
  inputEl.style.height = '48px';

  messages.push({ role: 'user', content: userText });
  renderMessages();
  loading = true;
  sendBtn.disabled = true;
  showLoading();

  // Haiku 4.5 による事前判定（レベル4：製品と関係ない質問をブロック）
  const isRelevant = await judgeQuestionRelevance(userText);
  if (!isRelevant) {
    // 直前にpushしたuserメッセージを表示専用に変更（次回API送信時に除外）
    messages[messages.length - 1]._display_only = true;
    const rejectMsg = '申し訳ありませんが、私は株式会社ベアリッジ（B-EAR）に関するご質問にお答えする専門アシスタントです。\n\n以下のような内容についてお聞かせください：\n・製品（ALVO 1.9、BRIDGECOM X10、X5、X10コンパクト、X10アスリート、LT、R2、VoiSniper など）\n・価格・見積・デモ機・レンタル\n・代理店紹介\n・修理・サポート・保証\n・会社情報・勤務地\n・採用・求人・キャリア';
    messages.push({ role: 'assistant', content: rejectMsg, _display_only: true, _system: true });
    loading = false;
    sendBtn.disabled = false;
    renderMessages();
    inputEl.focus();
    return;
  }

  try {
    // ストリーミング応答で fetch（USE_SERVER_PROXY=true 前提）
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2500,
        stream: true,
        system: [
          { type: "text", text: SYSTEM_PROMPT, cache_control: { type: "ephemeral" } },
          { type: "text", text: '【重要：回答言語】\n' + (translations[currentLang] || translations.ja).langInstruction }
        ],
        messages: prepareApiMessages(),
      })
    });

    // エラーレスポンス処理（429・5xx 等）
    if (!response.ok) {
      let errorData = {};
      try { errorData = await response.json(); } catch {}
      const loadingEl = document.querySelector('.loading');
      if (loadingEl) loadingEl.remove();
      messages[messages.length - 1]._display_only = true;
      const errMsg = errorData.message ||
        (response.status === 429 ? '利用上限に達しました。しばらく経ってから再度お試しください。' :
         response.status === 403 ? '許可されていないアクセスです。' :
         '一時的なエラーが発生しました。');
      messages.push({ role: 'assistant', content: errMsg, _display_only: true, _system: true });
      loading = false;
      sendBtn.disabled = false;
      renderMessages();
      inputEl.focus();
      return;
    }

    // ローディングドットを消して、空の assistant メッセージを追加（プレースホルダー）
    const loadingEl = document.querySelector('.loading');
    if (loadingEl) loadingEl.remove();
    const assistantMsg = { role: 'assistant', content: '' };
    messages.push(assistantMsg);
    const assistantIdx = messages.length - 1;
    renderMessages();

    // SSE ストリームを読み取って、テキストを逐次更新
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let receivedText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (!payload || payload === '[DONE]') continue;
        try {
          const event = JSON.parse(payload);
          if (event.type === 'content_block_delta' && event.delta && event.delta.type === 'text_delta') {
            receivedText += event.delta.text;
            assistantMsg.content = receivedText;
            updateStreamingBubble(assistantIdx, receivedText);
          }
        } catch {}
      }
    }

    if (!receivedText) {
      assistantMsg.content = '申し訳ございません。回答の取得に失敗しました。';
    }
    finalizeStreamingBubble(assistantIdx);

    // スプレッドシートにログを記録
    fetch('https://script.google.com/macros/s/AKfycbz0Jm2Fc_7pimlmmjGaH2CP_wkQL8MQWsthm0_BBKMOHXIRrdE-lqyTOaDhDT6tRazM/exec', {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        question: userText,
        answer: assistantMsg.content,
        device: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent) ? 'スマホ' : 'PC'
      })
    }).catch(() => {});
  } catch {
    const loadingEl = document.querySelector('.loading');
    if (loadingEl) loadingEl.remove();
    messages.push({ role: 'assistant', content: '通信エラーが発生しました。しばらく経ってから再度お試しください。' });
  } finally {
    loading = false;
    sendBtn.disabled = false;
    renderMessages();
    inputEl.focus();
  }
}

function copyMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const text = msg.content + '\n\n— Mr. B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/';
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll(`[data-idx="${idx}"] .msg-btn`);
    if (btns[0]) {
      const original = btns[0].textContent;
      btns[0].textContent = '✓ コピーしました';
      btns[0].classList.add('copied');
      setTimeout(() => { btns[0].textContent = original; btns[0].classList.remove('copied'); }, 2000);
    }
  });
}

function shareMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const text = msg.content + '\n\n— Mr. B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/';
  if (navigator.share) {
    navigator.share({
      title: 'Mr. B-EAR からの回答',
      text: text,
      url: 'https://mr-b-ear-agent.vercel.app/'
    }).catch(() => {});
  } else {
    // PCなどでWeb Share API非対応の場合はコピーで代替
    navigator.clipboard.writeText(text);
    alert('回答をクリップボードにコピーしました。LINE・メール・チャットなどに貼り付けてご共有ください。');
  }
}

function emailMessage(idx) {
  const msg = messages[idx];
  if (!msg) return;
  const subject = encodeURIComponent('Mr. B-EAR からの回答 (ALVO 1.9について)');
  const body = encodeURIComponent(msg.content + '\n\n— Mr. B-EAR (ALVO 1.9 AIエージェント) より\nhttps://mr-b-ear-agent.vercel.app/');
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

// ===== ストリーミング表示用ヘルパー =====
let _streamScrolled = false;

function updateStreamingBubble(idx, text) {
  const bubble = messagesEl.querySelector(`[data-idx="${idx}"] .bubble.assistant`);
  if (!bubble) return;
  bubble.innerHTML = markdownToHtml(text);
  if (!_streamScrolled) {
    const wrap = messagesEl.querySelector(`[data-idx="${idx}"]`);
    if (wrap) wrap.scrollIntoView({ block: 'start', behavior: 'smooth' });
    _streamScrolled = true;
  }
}

function finalizeStreamingBubble(idx) {
  _streamScrolled = false;
  const bubble = messagesEl.querySelector(`[data-idx="${idx}"] .bubble.assistant`);
  if (!bubble) return;
  bubble.innerHTML = `${markdownToHtml(messages[idx].content)}
    <div class="msg-actions">
      <button class="msg-btn" onclick="copyMessage(${idx})" title="コピー">📋 コピー</button>
      <button class="msg-btn" onclick="shareMessage(${idx})" title="共有">↗ 共有</button>
      <button class="msg-btn" onclick="emailMessage(${idx})" title="メールで送る">✉ メール</button>
    </div>`;
}

function markdownToHtml(text) {
  // HTMLエスケープ
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // テーブル変換
  text = text.replace(/^\|(.+)\|\s*\n\|[\s\-:|]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm, (match, headers, rows) => {
    const headerCells = headers.split('|').map(c => c.trim()).filter(c => c).map(c => `<th style="padding:6px 10px;border:1px solid #ccc;background:#f3f4f6;text-align:left;">${c}</th>`).join('');
    const rowsHtml = rows.trim().split('\n').map(row => {
      const cells = row.split('|').map(c => c.trim()).filter(c => c).map(c => `<td style="padding:6px 10px;border:1px solid #ccc;">${c}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table style="border-collapse:collapse;margin:8px 0;font-size:13px;"><thead><tr>${headerCells}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
  });

  // 太字・斜体・見出し・箇条書き
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  text = text.replace(/^[-]\s+(.+)$/gm, '・$1');

  // Markdown 形式の [テキスト](URL) → <a>
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // プレーン URL を自動リンク化（既存の href 属性内のものは除外、末尾の句読点は含めない）
  text = text.replace(/(^|[^"'=>])(https?:\/\/[^\s<>"'()\[\]、。，．]+[^\s<>"'()\[\]、。，．,.;:!?])/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');

  // メールアドレスを mailto: リンクに（href 内は除外）
  text = text.replace(/(^|[^"'=>])([\w.+-]+@[\w-]+\.[\w.-]+)(?![\w.@])/g, '$1<a href="mailto:$2">$2</a>');

  // 日本式電話番号（0で始まる、XX-XXX-XXXX / XXX-XXX-XXXX / XXXX-XX-XXXX 等）を tel: リンクに
  text = text.replace(/(^|[^\w>])(0\d{1,4}-\d{1,4}-\d{3,4})(?![\d-])/g, '$1<a href="tel:$2">$2</a>');

  // テーブル内の改行を一時保護してから<br>変換
  text = text.replace(/<table[\s\S]*?<\/table>/g, m => m.replace(/\n/g, ''));
  text = text.replace(/\n/g, '<br>');
  text = text.replace(//g, '\n');

  return text;
}

function toggleApiKeyPanel() {
  const panel = document.getElementById('apiKeyPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('apiKeyStatus').textContent = '✓ APIキーが設定されています';
    }
  }
}

function forceReload() {
  // キャッシュバスト用のクエリパラメータを付与して強制リロード
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('_t', Date.now().toString());
    window.location.href = url.toString();
  } catch {
    window.location.reload();
  }
}

function toggleFaqPanel() {
  const panel = document.getElementById('faqPanel');
  const overlay = document.getElementById('faqOverlay');
  if (!panel || !overlay) return;
  const willOpen = !panel.classList.contains('open');
  panel.classList.toggle('open', willOpen);
  overlay.classList.toggle('open', willOpen);
  if (willOpen) renderFaqList();
}

function renderFaqList() {
  const t = translations[currentLang] || translations.ja;
  const listEl = document.getElementById('faqPanelList');
  const titleEl = document.getElementById('faqPanelTitle');
  if (titleEl && t.faqTitle) titleEl.textContent = t.faqTitle;
  if (!listEl) return;
  listEl.innerHTML = '';
  const qs = (t.faqQuestions && t.faqQuestions.length) ? t.faqQuestions : (translations.ja.faqQuestions || []);
  qs.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'faq-panel-item';
    btn.textContent = q;
    btn.onclick = () => { toggleFaqPanel(); sendMessage(q); };
    listEl.appendChild(btn);
  });
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('apiKeyStatus').textContent = '⚠ 正しいAPIキーを入力してください（sk-ant- で始まる文字列）';
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiKeyStatus').textContent = '✓ 保存しました';
  setTimeout(() => { document.getElementById('apiKeyPanel').style.display = 'none'; }, 1000);
}

// 起動時の処理
window.addEventListener('load', () => {
  // サーバープロキシ使用時は、APIキーボタンを非表示にする
  if (USE_SERVER_PROXY) {
    const apiKeyBtn = document.getElementById('apiKeyBtn');
    const apiKeyPanel = document.getElementById('apiKeyPanel');
    if (apiKeyBtn) apiKeyBtn.style.display = 'none';
    if (apiKeyPanel) apiKeyPanel.style.display = 'none';
    return;
  }
  // 直接Anthropic API呼び出し時のみ、APIキー未設定なら自動表示
  if (!localStorage.getItem('anthropic_api_key')) {
    document.getElementById('apiKeyPanel').style.display = 'block';
    document.getElementById('apiKeyStatus').textContent = '⚠ APIキーを入力して保存してください';
  }
});
</script>
